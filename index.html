
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EG-Finance Fx Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, rgb(var(--color-border) / 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgb(var(--color-border) / 0.1) 1px, transparent 1px)",
            },
            colors: {
              background: 'rgb(var(--color-bg) / <alpha-value>)',
              panel: 'rgb(var(--color-panel) / <alpha-value>)',
              border: 'rgb(var(--color-border) / <alpha-value>)',
              accent: 'rgb(var(--color-accent) / <alpha-value>)',
              glow: 'rgb(var(--color-glow) / <alpha-value>)',
              textBase: 'rgb(var(--color-text-base) / <alpha-value>)',
              textMuted: 'rgb(var(--color-text-muted) / <alpha-value>)',
              onAccent: 'rgb(var(--color-on-accent) / <alpha-value>)',
            }
          }
        }
      }
    </script>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<style>
  :root {
    /* Blue Theme (Default) */
    --color-bg: 2 6 23;      /* #020617 Slate 950 */
    --color-panel: 15 23 42; /* #0f172a Slate 900 */
    --color-border: 30 58 138; /* #1e3a8a Blue 900 */
    --color-accent: 37 99 235; /* #2563eb Blue 600 */
    --color-on-accent: 255 255 255; /* White text on Blue */
    --color-glow: 34 211 238;  /* #22d3ee Cyan 400 */
    --color-text-base: 203 213 225; /* #cbd5e1 Slate 300 */
    --color-text-muted: 100 116 139; /* #64748b Slate 500 */
  }

  .theme-red {
    /* Red Theme */
    --color-bg: 5 0 0;       /* #050000 Very Dark Red/Black */
    --color-panel: 24 4 4;   /* #180404 Dark Red Panel */
    --color-border: 127 29 29; /* #7f1d1d Red 900 */
    --color-accent: 220 38 38; /* #dc2626 Red 600 */
    --color-on-accent: 255 255 255; /* White text on Red */
    --color-glow: 239 68 68;   /* #ef4444 Red 500 */
    --color-text-base: 228 228 231; /* #e4e4e7 Zinc 200 */
    --color-text-muted: 113 113 122; /* #71717a Zinc 500 */
  }

  .theme-bw {
    /* Black & White Theme */
    --color-bg: 0 0 0;       /* #000000 Black */
    --color-panel: 10 10 10; /* #0a0a0a Neutral 950 */
    --color-border: 64 64 64; /* #404040 Neutral 700 */
    --color-accent: 255 255 255; /* #ffffff White */
    --color-on-accent: 0 0 0;    /* Black text on White */
    --color-glow: 212 212 212;   /* #d4d4d4 Neutral 300 */
    --color-text-base: 245 245 245; /* #f5f5f5 Neutral 100 */
    --color-text-muted: 115 115 115; /* #737373 Neutral 500 */
  }

  .theme-light {
    /* Bright/Light Theme */
    --color-bg: 248 250 252;   /* #f8fafc Slate 50 */
    --color-panel: 255 255 255; /* #ffffff White */
    --color-border: 203 213 225; /* #cbd5e1 Slate 300 */
    --color-accent: 37 99 235; /* #2563eb Blue 600 */
    --color-on-accent: 255 255 255; /* White text on Blue */
    --color-glow: 15 23 42;    /* #0f172a Slate 900 (Dark glow for light bg) */
    --color-text-base: 30 41 59; /* #1e293b Slate 800 */
    --color-text-muted: 100 116 139; /* #64748b Slate 500 */
  }

  body {
    background-color: rgb(var(--color-bg));
    color: rgb(var(--color-text-base));
  }
  
  .bg-grid {
    background-size: 40px 40px;
    background-image: 
      linear-gradient(to right, rgb(var(--color-border) / 0.1) 1px, transparent 1px),
      linear-gradient(to bottom, rgb(var(--color-border) / 0.1) 1px, transparent 1px);
  }
  
  /* Scrollbar Styling */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: rgb(var(--color-bg));
  }
  ::-webkit-scrollbar-thumb {
    background: rgb(var(--color-border));
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgb(var(--color-accent));
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-background text-textBase overflow-hidden font-sans antialiased selection:bg-glow/30 selection:text-glow">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
